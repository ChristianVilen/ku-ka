name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next version
        id: version
        run: |
          LAST=$(git tag --list 'V*' --sort=-version:refname | head -1)
          LAST=${LAST:-V0.0.0}
          MAJOR=$(echo "$LAST" | awk -F. '{print $1}')
          MINOR=$(echo "$LAST" | awk -F. '{print $2}')
          PATCH=$(echo "$LAST" | awk -F. '{print $3}')
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          xcodebuild -project KuKa.xcodeproj -scheme KuKa -configuration Release -derivedDataPath build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO

      - name: Package
        run: |
          cd build/Build/Products/Release
          zip -r KuKa.zip KuKa.app

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
          gh release create "${{ steps.version.outputs.tag }}" \
            build/Build/Products/Release/KuKa.zip \
            --title "Ku-Ka ${{ steps.version.outputs.tag }}" \
            --generate-notes
